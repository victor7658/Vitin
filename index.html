<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila do Victor</title>

<style>
body {
    background-color: #1e90ff;
    font-family: Arial;
    color: white;
    text-align: center;
}

.materias {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 15px;
}

.materia {
    background: white;
    color: #1e90ff;
    padding: 15px;
    border-radius: 10px;
    cursor: pointer;
    width: 180px;
}

.anotacao, .calculadora {
    display: none;
    margin-top: 30px;
}

textarea {
    width: 70%;
    height: 150px;
    border-radius: 10px;
}

button {
    margin: 5px;
    padding: 10px;
    border-radius: 8px;
    border: none;
    cursor: pointer;
}

.salvar { background: green; color: white; }
.sair { background: red; color: white; }
.btn { background: white; color: #1e90ff; }

/* CALCULADORA */
.calc-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    display: inline-block;
    color: black;
}

#display {
    width: 200px;
    height: 40px;
    margin-bottom: 10px;
    text-align: right;
    font-size: 18px;
}

.calc-btn {
    width: 45px;
    height: 45px;
}
</style>
</head>

<body>

<h1>Mochila do Victor 🎒</h1>

<div id="menu" class="materias"></div>

<div id="area-anotacao" class="anotacao">
    <h2 id="titulo-materia"></h2>
    <textarea id="texto"></textarea><br>
    <button class="salvar" onclick="salvar()">Salvar</button>
    <button class="sair" onclick="sair()">Sair</button>
</div>

<!-- CALCULADORA -->
<div id="area-calculadora" class="calculadora">
    <h2>Calculadora</h2>

    <div class="calc-box">
        <input id="display" readonly><br>

        <button class="calc-btn" onclick="add('7')">7</button>
        <button class="calc-btn" onclick="add('8')">8</button>
        <button class="calc-btn" onclick="add('9')">9</button>
        <button class="calc-btn" onclick="add('/')">÷</button><br>

        <button class="calc-btn" onclick="add('4')">4</button>
        <button class="calc-btn" onclick="add('5')">5</button>
        <button class="calc-btn" onclick="add('6')">6</button>
        <button class="calc-btn" onclick="add('*')">×</button><br>

        <button class="calc-btn" onclick="add('1')">1</button>
        <button class="calc-btn" onclick="add('2')">2</button>
        <button class="calc-btn" onclick="add('3')">3</button>
        <button class="calc-btn" onclick="add('-')">-</button><br>

        <button class="calc-btn" onclick="add('0')">0</button>
        <button class="calc-btn" onclick="calcular()">=</button>
        <button class="calc-btn" onclick="limpar()">C</button>
        <button class="calc-btn" onclick="add('+')">+</button>
    </div>

    <br>
    <button class="sair" onclick="sair()">Voltar</button>
</div>

<div style="margin-top: 40px;">
    <button class="btn" onclick="abrirCalculadora()">Calculadora</button>
</div>

<script>
const materias = ["Matemática","Português","História","Geografia"];

let materiaAtual = "";
const menu = document.getElementById("menu");

materias.forEach(m => {
    const div = document.createElement("div");
    div.className = "materia";
    div.innerText = m;
    div.onclick = () => abrirMateria(m);
    menu.appendChild(div);
});

function abrirMateria(materia) {
    materiaAtual = materia;
    menu.style.display = "none";
    document.getElementById("area-anotacao").style.display = "block";
    document.getElementById("titulo-materia").innerText = materia;
}

function salvar() {
    localStorage.setItem(materiaAtual, document.getElementById("texto").value);
}

function sair() {
    menu.style.display = "flex";
    document.getElementById("area-anotacao").style.display = "none";
    document.getElementById("area-calculadora").style.display = "none";
}

/* CALCULADORA */
function abrirCalculadora() {
    menu.style.display = "none";
    document.getElementById("area-calculadora").style.display = "block";
}

function add(valor) {
    document.getElementById("display").value += valor;
}

function calcular() {
    try {
        let resultado = eval(document.getElementById("display").value);
        document.getElementById("display").value = resultado;
    } catch {
        alert("Erro!");
    }
}

function limpar() {
    document.getElementById("display").value = "";
}

function apagar() {
    let valor = document.getElementById("display").value;
    document.getElementById("display").value = valor.slice(0, -1);
}

/* TECLADO 🔥 */
document.addEventListener("keydown", function(e) {
    const key = e.key;

    if (!document.getElementById("area-calculadora").style.display.includes("block")) return;

    if (!isNaN(key) || ["+", "-", "*", "/", "."].includes(key)) {
        add(key);
    }

    if (key === "Enter") calcular();
    if (key === "Backspace") apagar();
    if (key === "Escape") limpar();
});
</script>

</body>
</html>
