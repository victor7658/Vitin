<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Áudio do Meme</title>

    <style>
        body {
            background-color: #1e90ff;
            color: white;
            text-align: center;
            font-family: Arial;
            margin-top: 100px;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            background-color: white;
            color: #1e90ff;
            font-weight: bold;
        }

        button:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>

    <h1>🔊 Tocar áudio</h1>

    <!-- ÁUDIO -->
    <audio id="audio">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <!-- BOTÃO -->
    <button onclick="tocarAudio()">OLHA A MENSAGEM 👀</button>

    <script>
        function tocarAudio() {
            const audio = document.getElementById("audio");
            audio.currentTime = 0; // reinicia
            audio.play();
        }
    </script>

</body>
</html>
