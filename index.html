<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila do Victor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e90ff, #6a5acd);
    color: white;
    text-align: center;
    transition: 0.4s;
}

/* 🌙 MODO ESCURO */
body.dark {
    background: #0d1117;
}

/* TÍTULO */
h1 {
    margin-top: 20px;
    font-size: 2.2em;
}

/* GRID */
.materias {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARDS */
.materia {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.15);
    border-radius: 15px;
    padding: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.2);
}

.materia:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.25);
}

/* 🌙 CARDS NO DARK */
body.dark .materia {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
}

/* ÁREA DE TEXTO */
.anotacao {
    display: none;
    padding: 20px;
}

textarea {
    width: 90%;
    height: 200px;
    border-radius: 15px;
    border: none;
    padding: 15px;
    font-size: 16px;
    outline: none;
}

/* 🌙 TEXTAREA DARK */
body.dark textarea {
    background: #161b22;
    color: #e6edf3;
}

/* 🔎 BUSCA */
#busca {
    width: 90%;
    padding: 10px;
    border-radius: 10px;
    border: none;
    margin-bottom: 10px;
}

/* BOTÕES */
button {
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.salvar {
    background: #00c853;
    color: white;
}

.sair {
    background: #ff1744;
    color: white;
}

.btn {
    background: white;
    color: #1e90ff;
}

button:hover {
    transform: scale(1.05);
    opacity: 0.9;
}

/* 🌙 BOTÕES NO DARK */
body.dark .btn {
    background: #161b22;
    color: white;
}

/* LINKS */
.links {
    margin-top: 30px;
}
</style>
</head>

<body>

<audio id="audio">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<h1>Mochila do Victor 🎒</h1>
<p>Escolha uma matéria</p>

<div id="menu" class="materias"></div>

<div id="area-anotacao" class="anotacao">
    <h2 id="titulo-materia"></h2>

    <!-- 🔎 CAMPO DE BUSCA -->
    <input type="text" id="busca" placeholder="🔎 Buscar na anotação..." onkeyup="buscarTexto()">

    <textarea id="texto"></textarea><br>
    <button class="salvar" onclick="salvar()">Salvar</button>
    <button class="sair" onclick="sair()">Voltar</button>
</div>

<div class="links">
    <a href="aula.html"><button class="btn">AULA Z</button></a>
    <a href="peixe.html"><button class="btn">Tucunare</button></a>
    <a href="duende.html"><button class="btn">Duende</button></a>
    <a href="Braille.html"><button class="btn">Braille</button></a>
    <a href="Direitos.html"><button class="btn">Direitos</button></a>
    <a href="placa-mae.html"><button class="btn">Placa-mãe</button></a>
</div>

<script>
const materias = [
    "Matemática","Português","Educação Física","Filosofia","Historia",
    "Geografia","Biologia","Artes","Sistemas Operacionais",
    "Praticas Experimentais","Projeto de Vida","Gestão de Tempo",
    "Poo Java","Noções de Robótica","Programação Web","Fisica",
    "Arquitetura e Manutenção de Computadores","Quimica",
    "Educação Financeira","Logica de Programação",
    "Estudos Orientados","HTML","Sociologia","Ingles"
];

let materiaAtual = "";
const menu = document.getElementById("menu");

materias.forEach(m => {
    const div = document.createElement("div");
    div.className = "materia";
    div.innerText = m;
    div.onclick = () => abrirMateria(m);
    menu.appendChild(div);
});

function abrirMateria(materia) {
    materiaAtual = materia;

    document.body.classList.add("dark");

    document.getElementById("menu").style.display = "none";
    document.getElementById("area-anotacao").style.display = "block";
    document.getElementById("titulo-materia").innerText = "Anotações de " + materia;
    carregar();
}

function salvar() {
    let texto = document.getElementById("texto").value;
    localStorage.setItem(materiaAtual, texto);
    alert("Salvo!");
}

function carregar() {
    let textoSalvo = localStorage.getItem(materiaAtual);
    document.getElementById("texto").value = textoSalvo ? textoSalvo : "";
}

function sair() {
    document.body.classList.remove("dark");

    document.getElementById("menu").style.display = "grid";
    document.getElementById("area-anotacao").style.display = "none";
}

/* 🔎 BUSCA MELHORADA (PALAVRA COMPLETA) */
function buscarTexto() {
    const busca = document.getElementById("busca").value.trim().toLowerCase();
    const textarea = document.getElementById("texto");

    if (!busca) return;

    const texto = textarea.value.toLowerCase();

    const regex = new RegExp("\\b" + busca + "\\b", "gi");

    let match;
    let posicoes = [];

    while ((match = regex.exec(texto)) !== null) {
        posicoes.push(match.index);
    }

    if (posicoes.length === 0) {
        alert("Palavra não encontrada!");
        return;
    }

    const pos = posicoes[0];

    textarea.focus();
    textarea.setSelectionRange(pos, pos + busca.length);

    const proporcao = pos / textarea.value.length;
    textarea.scrollTop = textarea.scrollHeight * proporcao;
}

document.body.addEventListener("click", function () {
    const audio = document.getElementById("audio");
    audio.play().catch(()=>{});
}, { once: true });
</script>

</body>
</html>
