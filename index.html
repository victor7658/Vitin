<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mochila do Victor</title>

    <!-- 🔥 FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js"></script>

    <style>
        body {
            background-color: #1e90ff;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .materias {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .materia {
            background-color: #ffffff;
            color: #1e90ff;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 180px;
            transition: 0.3s;
        }

        .materia:hover {
            background-color: #e0e0e0;
        }

        .anotacao {
            margin-top: 30px;
            display: none;
        }

        textarea {
            width: 70%;
            height: 150px;
            border-radius: 10px;
            padding: 10px;
            border: none;
            resize: none;
        }

        button {
            margin: 10px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .salvar {
            background-color: #28a745;
            color: white;
        }

        .sair {
            background-color: #dc3545;
            color: white;
        }

        .btn {
            background-color: #ffffff;
            color: #1e90ff;
        }

        .btn:hover {
            background-color: #e0e0e0;
        }
    </style>
</head>

<body>

    <audio id="audio">
        <source src="audio.mp3" type="audio/mpeg">
    </audio>

    <h1>Mochila do Victor 🎒</h1>
    <p>Clique na matéria para fazer anotações</p>

    <div id="menu" class="materias"></div>

    <div id="area-anotacao" class="anotacao">
        <h2 id="titulo-materia"></h2>
        <textarea id="texto"></textarea><br>
        <button class="salvar" onclick="salvar()">Salvar</button>
        <button class="sair" onclick="sair()">Sair</button>
    </div>

    <div style="margin-top: 40px;">
        <a href="aula.html"><button class="btn">AULA Z</button></a>
        <a href="peixe.html"><button class="btn">Tucunare</button></a>
        <a href="duende.html"><button class="btn">Duende</button></a>
        <a href="Braille.html"><button class="btn">Braille</button></a>
        <a href="Direitos.html"><button class="btn">Direitos</button></a>
        <a href="placa-mae.html"><button class="btn">placa-mae</button></a>
    </div>

    <script>
        // 🔥 CONFIG FIREBASE (COLE A SUA AQUI)
        const firebaseConfig = {
            apiKey: "SUA_KEY",
            authDomain: "SEU_DOMINIO",
            projectId: "SEU_ID",
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        const materias = [
            "Matemática","Português","Educação Física","Filosofia","Historia",
            "Geografia","Biologia","Artes","Sistemas Operacionais",
            "Praticas Experimentais","Projeto de Vida","Gestão de Tempo",
            "Poo Java","Noções de Robótica","Programação Web","Fisica",
            "Arquitetura e Manutenção de Computadores","Quimica",
            "Educação Financeira","Logica de Programação",
            "Estudos Orientados","HTML","Sociologia","Ingles"
        ];

        let materiaAtual = "";
        const menu = document.getElementById("menu");

        materias.forEach(m => {
            const div = document.createElement("div");
            div.className = "materia";
            div.innerText = m;
            div.onclick = () => abrirMateria(m);
            menu.appendChild(div);
        });

        function abrirMateria(materia) {
            materiaAtual = materia;
            document.getElementById("menu").style.display = "none";
            document.getElementById("area-anotacao").style.display = "block";
            document.getElementById("titulo-materia").innerText = "Anotações de " + materia;
            carregar();
        }

        // 🔥 SALVAR LOCAL + NUVEM
        async function salvar() {
            let texto = document.getElementById("texto").value;

            // salva local
            localStorage.setItem("materia_" + materiaAtual, texto);

            // salva na nuvem
            try {
                await db.collection("anotacoes").doc(materiaAtual).set({
                    texto: texto
                });
                alert("Salvo na nuvem ☁️");
            } catch (e) {
                alert("Erro ao salvar na nuvem");
            }
        }

        // 🔥 CARREGAR LOCAL + NUVEM
        async function carregar() {
            // tenta local primeiro
            let textoLocal = localStorage.getItem("materia_" + materiaAtual);
            if (textoLocal) {
                document.getElementById("texto").value = textoLocal;
            }

            // depois tenta nuvem
            try {
                const doc = await db.collection("anotacoes").doc(materiaAtual).get();
                if (doc.exists) {
                    document.getElementById("texto").value = doc.data().texto;
                }
            } catch (e) {
                console.log("Erro ao carregar da nuvem");
            }
        }

        function sair() {
            document.getElementById("menu").style.display = "flex";
            document.getElementById("area-anotacao").style.display = "none";
        }

        document.body.addEventListener("click", function () {
            const audio = document.getElementById("audio");
            audio.play().catch(()=>{});
        }, { once: true });
    </script>

</body>
</html>
