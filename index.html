<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Mochila do Victor</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #1e90ff, #6a5acd);
    color: white;
    text-align: center;
    transition: 0.4s;
}

/* 🌙 DARK MODE */
body.dark {
    background: #0d1117;
}

/* TÍTULO */
h1 {
    margin-top: 20px;
    font-size: 2.2em;
}

/* 🔥 RELÓGIO NEON */
#clockBox {
    margin-top: 10px;
    display: inline-block;
    padding: 15px 25px;
    border-radius: 20px;
    background: rgba(0,0,0,0.2);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
}

/* NEON RELÓGIO */
#relogio {
    font-size: 2.2em;
    font-weight: bold;
    letter-spacing: 3px;
    color: #00fff7;
    text-shadow:
        0 0 5px #00fff7,
        0 0 10px #00fff7,
        0 0 20px #00eaff,
        0 0 40px #00eaff;
    animation: neonPulse 1.5s infinite alternate;
}

/* NEON ANIMAÇÃO */
@keyframes neonPulse {
    from {
        text-shadow:
        0 0 5px #00fff7,
        0 0 10px #00fff7,
        0 0 20px #00eaff,
        0 0 30px #00eaff;
    }
    to {
        text-shadow:
        0 0 10px #00fff7,
        0 0 20px #00fff7,
        0 0 30px #00eaff,
        0 0 50px #00eaff;
    }
}

/* DATA */
#data {
    font-size: 1em;
    margin-top: 5px;
    opacity: 0.9;
}

/* GRID */
.materias {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 15px;
    padding: 20px;
}

/* CARDS */
.materia {
    backdrop-filter: blur(10px);
    background: rgba(255,255,255,0.15);
    border-radius: 15px;
    padding: 20px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
    border: 1px solid rgba(255,255,255,0.2);
}

.materia:hover {
    transform: scale(1.05);
    background: rgba(255,255,255,0.25);
}

/* DARK CARDS */
body.dark .materia {
    background: rgba(255,255,255,0.05);
}

/* ANOTAÇÕES */
.anotacao {
    display: none;
    padding: 20px;
}

textarea {
    width: 90%;
    height: 200px;
    border-radius: 15px;
    border: none;
    padding: 15px;
    font-size: 16px;
    outline: none;
}

/* DARK TEXTAREA */
body.dark textarea {
    background: #161b22;
    color: #e6edf3;
}

/* BOTÕES */
button {
    margin: 10px;
    padding: 12px 20px;
    border-radius: 10px;
    border: none;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

.salvar { background: #00c853; color: white; }
.sair { background: #ff1744; color: white; }
.btn { background: white; color: #1e90ff; }

button:hover {
    transform: scale(1.05);
}

/* LINKS */
.links {
    margin-top: 30px;
}
</style>
</head>

<body>

<audio id="audio">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<h1>Mochila do Victor 🎒</h1>

<!-- 🔥 RELÓGIO NEON -->
<div id="clockBox">
    <div id="relogio">00:00:00</div>
    <div id="data">Carregando data...</div>
</div>

<p>Escolha uma matéria</p>

<div id="menu" class="materias"></div>

<div id="area-anotacao" class="anotacao">
    <h2 id="titulo-materia"></h2>
    <textarea id="texto"></textarea><br>
    <button class="salvar" onclick="salvar()">Salvar</button>
    <button class="sair" onclick="sair()">Voltar</button>
</div>

<div class="links">
    <a href="aula.html"><button class="btn">AULA Z</button></a>
    <a href="peixe.html"><button class="btn">Tucunare</button></a>
    <a href="duende.html"><button class="btn">Duende</button></a>
    <a href="Braille.html"><button class="btn">Braille</button></a>
    <a href="Direitos.html"><button class="btn">Direitos</button></a>
    <a href="placa-mae.html"><button class="btn">Placa-mãe</button></a>
</div>

<script>
const materias = [
    "Matemática","Português","Educação Física","Filosofia","Historia",
    "Geografia","Biologia","Artes","Sistemas Operacionais",
    "Praticas Experimentais","Projeto de Vida","Gestão de Tempo",
    "POO Java","Noções de Robótica","Programação Web","Física",
    "Arquitetura e Manutenção de Computadores","Química",
    "Educação Financeira","Lógica de Programação",
    "Estudos Orientados","HTML","Sociologia","Inglês"
];

let materiaAtual = "";
const menu = document.getElementById("menu");

materias.forEach(m => {
    const div = document.createElement("div");
    div.className = "materia";
    div.innerText = m;
    div.onclick = () => abrirMateria(m);
    menu.appendChild(div);
});

function abrirMateria(materia) {
    materiaAtual = materia;
    document.body.classList.add("dark");

    document.getElementById("menu").style.display = "none";
    document.getElementById("area-anotacao").style.display = "block";
    document.getElementById("titulo-materia").innerText = "Anotações de " + materia;

    carregar();
}

function salvar() {
    localStorage.setItem(materiaAtual, document.getElementById("texto").value);
    alert("Salvo!");
}

function carregar() {
    document.getElementById("texto").value =
    localStorage.getItem(materiaAtual) || "";
}

function sair() {
    document.body.classList.remove("dark");
    document.getElementById("menu").style.display = "grid";
    document.getElementById("area-anotacao").style.display = "none";
}

/* 🔥 RELÓGIO NEON + DATA */
function atualizar() {
    const agora = new Date();

    let h = String(agora.getHours()).padStart(2,'0');
    let m = String(agora.getMinutes()).padStart(2,'0');
    let s = String(agora.getSeconds()).padStart(2,'0');

    document.getElementById("relogio").innerText = `${h}:${m}:${s}`;

    const dias = ["Domingo","Segunda","Terça","Quarta","Quinta","Sexta","Sábado"];
    const meses = ["Janeiro","Fevereiro","Março","Abril","Maio","Junho",
                   "Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];

    let textoData = `${dias[agora.getDay()]}, ${agora.getDate()} de ${meses[agora.getMonth()]} de ${agora.getFullYear()}`;

    document.getElementById("data").innerText = textoData;
}

setInterval(atualizar, 1000);
atualizar();

/* 🔊 SOM */
document.body.addEventListener("click", function () {
    document.getElementById("audio").play().catch(()=>{});
}, { once: true });

</script>

</body>
</html>
