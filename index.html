<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Mochila do Victor</title>
    <style>
        body {
            background-color: #1e90ff;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
        }

        h1 { margin-top: 20px; }

        .materias {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            margin-top: 30px;
        }

        .materia {
            background-color: #ffffff;
            color: #1e90ff;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 180px;
        }

        .anotacao, .calculadora {
            margin-top: 30px;
            display: none;
        }

        textarea {
            width: 70%;
            height: 150px;
            border-radius: 10px;
            padding: 10px;
            border: none;
        }

        button {
            margin: 5px;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }

        .salvar { background-color: #28a745; color: white; }
        .sair { background-color: #dc3545; color: white; }
        .btn { background-color: white; color: #1e90ff; }

        /* CALCULADORA */
        .calc-box {
            display: inline-block;
            background: white;
            padding: 20px;
            border-radius: 10px;
            color: black;
        }

        .calc-display {
            width: 200px;
            height: 40px;
            margin-bottom: 10px;
            text-align: right;
            padding: 5px;
            font-size: 18px;
        }

        .calc-btn {
            width: 45px;
            height: 45px;
            margin: 3px;
        }
    </style>
</head>

<body>

<audio id="audio">
    <source src="audio.mp3" type="audio/mpeg">
</audio>

<h1>Mochila do Victor 🎒</h1>
<p>Clique na matéria para fazer anotações</p>

<div id="menu" class="materias"></div>

<div id="area-anotacao" class="anotacao">
    <h2 id="titulo-materia"></h2>
    <textarea id="texto"></textarea><br>
    <button class="salvar" onclick="salvar()">Salvar</button>
    <button class="sair" onclick="sair()">Sair</button>
</div>

<!-- CALCULADORA -->
<div id="area-calculadora" class="calculadora">
    <h2>Calculadora</h2>
    <div class="calc-box">
        <input id="display" class="calc-display" readonly><br>

        <button class="calc-btn" onclick="add('7')">7</button>
        <button class="calc-btn" onclick="add('8')">8</button>
        <button class="calc-btn" onclick="add('9')">9</button>
        <button class="calc-btn" onclick="add('/')">÷</button><br>

        <button class="calc-btn" onclick="add('4')">4</button>
        <button class="calc-btn" onclick="add('5')">5</button>
        <button class="calc-btn" onclick="add('6')">6</button>
        <button class="calc-btn" onclick="add('*')">×</button><br>

        <button class="calc-btn" onclick="add('1')">1</button>
        <button class="calc-btn" onclick="add('2')">2</button>
        <button class="calc-btn" onclick="add('3')">3</button>
        <button class="calc-btn" onclick="add('-')">-</button><br>

        <button class="calc-btn" onclick="add('0')">0</button>
        <button class="calc-btn" onclick="calcular()">=</button>
        <button class="calc-btn" onclick="limpar()">C</button>
        <button class="calc-btn" onclick="add('+')">+</button>
    </div>
    <br>
    <button class="sair" onclick="sair()">Voltar</button>
</div>

<!-- BOTÕES EXTRAS -->
<div style="margin-top: 40px;">
    <a href="#"><button class="btn" onclick="abrirCalculadora()">Calculadora</button></a>
    <a href="aula.html"><button class="btn">AULA Z</button></a>
    <a href="peixe.html"><button class="btn">Tucunare</button></a>
    <a href="duende.html"><button class="btn">Duende</button></a>
    <a href="Braille.html"><button class="btn">Braille</button></a>
</div>

<script>
const materias = [
    "Matemática","Português","Educação Física","Filosofia","Historia",
    "Geografia","Biologia","Artes","Sistemas Operacionais",
    "Praticas Experimentais","Projeto de Vida","Gestão de Tempo",
    "Poo Java","Noções de Robótica","Programação Web","Fisica",
    "Arquitetura e Manutenção de Computadores","Quimica",
    "Educação Financeira","Logica de Programação",
    "Estudos Orientados","HTML","Sociologia","Ingles"
];

let materiaAtual = "";
const menu = document.getElementById("menu");

materias.forEach(m => {
    const div = document.createElement("div");
    div.className = "materia";
    div.innerText = m;
    div.onclick = () => abrirMateria(m);
    menu.appendChild(div);
});

function abrirMateria(materia) {
    materiaAtual = materia;
    menu.style.display = "none";
    document.getElementById("area-anotacao").style.display = "block";
    document.getElementById("titulo-materia").innerText = "Anotações de " + materia;
    carregar();
}

function salvar() {
    let texto = document.getElementById("texto").value;
    localStorage.setItem(materiaAtual, texto);
    alert("Anotação salva!");
}

function carregar() {
    let textoSalvo = localStorage.getItem(materiaAtual);
    document.getElementById("texto").value = textoSalvo ? textoSalvo : "";
}

function sair() {
    menu.style.display = "flex";
    document.getElementById("area-anotacao").style.display = "none";
    document.getElementById("area-calculadora").style.display = "none";
}

// CALCULADORA
function abrirCalculadora() {
    menu.style.display = "none";
    document.getElementById("area-calculadora").style.display = "block";
}

function add(valor) {
    document.getElementById("display").value += valor;
}

function calcular() {
    try {
        document.getElementById("display").value = eval(document.getElementById("display").value);
    } catch {
        alert("Erro na conta!");
    }
}

function limpar() {
    document.getElementById("display").value = "";
}

// ÁUDIO
document.body.addEventListener("click", function () {
    const audio = document.getElementById("audio");
    audio.play();
}, { once: true });
</script>

</body>
</html>
