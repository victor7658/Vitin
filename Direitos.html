<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Direitos Humanos na Escola</title>

<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0b3d91;
        color: white;
        text-align: center;
    }

    header {
        padding: 20px;
        background-color: #082c6c;
    }

    .conteudo {
        padding: 20px;
        max-width: 800px;
        margin: auto;
    }

    img {
        width: 100%;
        max-width: 400px;
        border-radius: 10px;
        margin: 20px 0;
    }

    textarea {
        width: 100%;
        height: 100px;
        border-radius: 10px;
        border: none;
        padding: 10px;
        font-size: 16px;
    }

    button {
        margin-top: 15px;
        padding: 10px 20px;
        border: none;
        border-radius: 8px;
        background-color: #1e90ff;
        color: white;
        font-size: 16px;
        cursor: pointer;
    }

    button:hover {
        background-color: #63b3ff;
    }

    .voltar {
        position: fixed;
        top: 10px;
        left: 10px;
        background-color: #ffffff;
        color: #0b3d91;
    }

    .comentario {
        background: white;
        color: black;
        padding: 10px;
        margin-top: 10px;
        border-radius: 8px;
    }
</style>
</head>

<body>

<button class="voltar" onclick="history.back()">⬅ Voltar</button>

<header>
    <h1>Direitos Humanos na Escola</h1>
</header>

<div class="conteudo">

    <img src="https://cdn.pixabay.com/photo/2016/03/31/19/56/children-1299976_1280.png">

    <p>
        Os direitos humanos na escola são fundamentais para garantir um ambiente respeitoso,
        seguro e inclusivo para todos.
    </p>

    <h3>Deixe seu comentário:</h3>

    <textarea id="comentarioInput" placeholder="Escreva aqui..."></textarea>
    <br>
    <button onclick="salvarComentario()">Enviar</button>

    <div id="listaComentarios"></div>

</div>

<script>
function salvarComentario() {
    let texto = document.getElementById("comentarioInput").value;

    if (texto.trim() === "") {
        alert("Escreva algo!");
        return;
    }

    let comentarios = JSON.parse(localStorage.getItem("comentarios")) || [];
    comentarios.push(texto);
    localStorage.setItem("comentarios", JSON.stringify(comentarios));

    mostrarComentarios();
    document.getElementById("comentarioInput").value = "";
}

function mostrarComentarios() {
    let lista = document.getElementById("listaComentarios");
    lista.innerHTML = "";

    let comentarios = JSON.parse(localStorage.getItem("comentarios")) || [];

    comentarios.forEach(function(texto) {
        let p = document.createElement("div");
        p.className = "comentario";
        p.textContent = texto;
        lista.appendChild(p);
    });
}

window.onload = mostrarComentarios;
</script>

</body>
</html>
