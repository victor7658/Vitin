<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tucunaré</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #001f1f, #003333);
            font-family: Arial, sans-serif;
        }

        .container {
            background: #012626;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px #00ffcc;
        }

        h1 {
            color: #00ffcc;
            margin-bottom: 15px;
        }

        img {
            width: 350px;
            border-radius: 15px;
            transition: 0.3s;
        }

        img:hover {
            transform: scale(1.05);
        }

        p {
            color: #cceeee;
            margin-top: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎣 Tucunaré</h1>

        <img src="https://i.pinimg.com/474x/a9/63/32/a963321e3b909f3a21ed5fd1a7e0e94f.jpg" 
             alt="Peixe Tucunaré">

        <p>Um dos peixes mais brabos da pescaria 💪</p>
    </div>

</body>
</html>
