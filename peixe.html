<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Tucunaré Estiloso</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d1117, #020617);
            font-family: Arial, sans-serif;
        }

        .card {
            background: #111827;
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.3);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.6);
        }

        h1 {
            color: #00ff88;
            margin-bottom: 15px;
        }

        img {
            width: 350px;
            border-radius: 15px;
        }

        p {
            color: #cbd5e1;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎣 Tucunaré com Chapéu</h1>

        <img src="a_digital_illustration_features_a_large_peacock_ba.png" 
             alt="Tucunaré com chapéu">

        <p>O peixe mais estiloso da pescaria 😎</p>
    </div>

</body>
</html>
